version: 2.1

jobs:
  build:
    docker:
      - image: cimg/node:18.0

    steps:
      - checkout

      - run:
          name: Install dependencies
          command: npm install

      # 🔥 Capture logs but preserve exit code
      - run:
          name: Run tests and capture logs
          command: |
            echo "=== TEST START ==="
            npm test 2>&1 | tee output.log
            echo "=== TEST END ==="
            exit ${PIPESTATUS[0]}

      - store_artifacts:
          path: output.log

workflows:
  build_and_test:
    jobs:
      - build