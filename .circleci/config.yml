version: 2.1

jobs:
  build:
    docker:
      - image: cimg/node:18.0

    steps:
      - checkout

      - run:
          name: Install Node dependencies
          command: npm install

      - run:
          name: Install Python
          command: |
            sudo apt update
            sudo apt install -y python3 python3-pip
            pip3 install pytest flake8

      - run:
          name: Run All Checks
          command: |
            echo "===== START PIPELINE =====" | tee output.log
            echo "" | tee -a output.log

            echo "========== BACKEND TESTS STARTED ==========" | tee -a output.log
            echo "" | tee -a output.log
            npm test 2>&1 | tee -a output.log || true
            echo "" | tee -a output.log

            echo "========== FRONTEND TESTS STARTED ==========" | tee -a output.log
            echo "" | tee -a output.log
            npm run frontend:test 2>&1 | tee -a output.log || true
            echo "" | tee -a output.log

            echo "========== PYTHON LINT STARTED ==========" | tee -a output.log
            echo "" | tee -a output.log
            cd pythonFiles
            flake8 . 2>&1 | tee -a ../output.log || true
            echo "" | tee -a ../output.log

            echo "========== PYTHON TESTS STARTED ==========" | tee -a ../output.log
            echo "" | tee -a ../output.log
            pytest 2>&1 | tee -a ../output.log || true
            echo "" | tee -a ../output.log
            cd ..

            echo "===== END PIPELINE =====" | tee -a output.log

            exit 1

      - store_artifacts:
          path: output.log

workflows:
  build_and_test:
    jobs:
      - build